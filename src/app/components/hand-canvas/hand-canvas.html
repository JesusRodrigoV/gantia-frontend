<div #canvasContainer class="canvas-container">
  @if (!modelLoaded()) {
    <div class="skeleton-loader">
      <img [src]="'/logos/logo.webp'" alt="Cargando..." class="skeleton-logo" />
      <p class="skeleton-text">Cargando modelo 3D...</p>
    </div>
  }
</div>

@let t = sensorSocket.telemetry();
@if (t) {
  <div class="telemetry-overlay">
    <div class="overlay-item">
      <span class="overlay-label">Flexión</span>
      <span class="overlay-value">{{ t.flex_index }} / {{ t.flex_middle }}</span>
    </div>
    <div class="overlay-item">
      <span class="overlay-label">Orientación</span>
      <span class="overlay-value">
        {{ t.accel_x | number:'1.1f' }} {{ t.accel_y | number:'1.1f' }} {{ t.accel_z | number:'1.1f' }}
      </span>
    </div>
  </div>
}
