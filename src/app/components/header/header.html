<header class="gantia-header" [class.scrolled]="scrolled()">
  <div class="header-container">
    <div class="brand-group">
      <a routerLink="/" class="logo-link" title="Inicio de Gantia">
        <img
          [ngSrc]="'/logos/logo.webp'"
          height="55"
          width="55"
          alt="Logo de Gantia - Letra Gamma minúscula"
          class="gantia-logo"
          priority
        />
      </a>
      <app-letras-gantia />
    </div>

    <nav class="main-nav">
      <div
        class="connection-status"
        [class]="'status-' + sensorSocket.connectionStatus()"
        [pTooltip]="statusLabel()"
        tooltipPosition="bottom"
      >
        <span class="status-dot"></span>
      </div>
      @if (mouseModeActive()) {
        <div class="mm-header-indicator" pTooltip="Mouse Mode Activado" tooltipPosition="bottom">
          <i class="bx bx-mouse" aria-hidden="true"></i>
        </div>
      }
      <app-rounded-button
        class="theme-toggle"
        (click)="themeService.toggleTheme()"
        [icon]="themeService.isDarkMode() ? 'bx bx-sun' : 'bx bx-moon'"
      />
      <ul>
        @for (link of links; track link.route) {
          <li>
            <a [routerLink]="link.route" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">{{ link.label }}</a>
          </li>
        }
        <li
          (click)="confirmLogout($event)"
          (keydown)="confirmLogout($event)"
          role="button"
          tabindex="0"
          aria-label="Cerrar sesión"
          class="logout-button"
          pTooltip="Cerrar Sesión"
          tooltipPosition="bottom"
        >
          <i class="bx bx-log-out" aria-hidden="true"></i>
        </li>
      </ul>
    </nav>
  </div>
</header>
