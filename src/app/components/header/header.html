<header class="gantia-header" [class.scrolled]="scrolled()">
  <div class="header-container">
    <div class="brand-group">
      <a routerLink="/app" class="logo-link" title="Inicio de Gantia">
        <img
          [ngSrc]="'/logos/logo.webp'"
          height="55"
          width="55"
          alt="Logo de Gantia - Letra Gamma minúscula"
          class="gantia-logo"
          priority
        />
      </a>
      <app-letras-gantia />
    </div>

    <nav class="main-nav">
      <div
        class="connection-status"
        [class]="'status-' + sensorSocket.connectionStatus()"
        [class.data-flowing]="sensorSocket.dataFlowing()"
        [pTooltip]="statusLabel()"
        tooltipPosition="bottom"
      >
        <span class="status-dot"></span>
        @if (sensorSocket.dataFlowing()) {
          <span class="flow-ring"></span>
        }
      </div>
      <div class="client-indicators" [class.loading]="clientStatus.isLoading()" [pTooltip]="clientTooltip()" tooltipPosition="bottom">
        @let cs = clientStatus.status();
        <span class="client-dot" [class.connected]="cs.glove" title="Guante"></span>
        <span class="client-dot" [class.connected]="cs.pico_w" title="Pico W"></span>
      </div>
      @if (mouseModeActive()) {
        <div class="mm-header-indicator" pTooltip="Mouse Mode Activado" tooltipPosition="bottom">
          <i class="bx bx-mouse" aria-hidden="true"></i>
        </div>
      }
      @if (sensorSocket.dataFlowing()) {
        <div class="mode-badge">
          <i class="bx bx-category" aria-hidden="true"></i>
          <p-select
            [options]="modeOptions"
            [(ngModel)]="sensorSocket.currentMode"
            (ngModelChange)="changeMode($event)"
            [checkmark]="true"
          />
        </div>
        <div class="target-selector">
          <i class="bx bx-share" aria-hidden="true"></i>
          <p-select
            [options]="targetOptions"
            optionLabel="label"
            optionValue="value"
            [(ngModel)]="selectedTarget"
            (ngModelChange)="changeTarget($event)"
            [checkmark]="true"
          />
        </div>
      }
      <app-rounded-button
        class="theme-toggle"
        (click)="themeService.toggleTheme()"
        [icon]="themeService.isDarkMode() ? 'bx bx-sun' : 'bx bx-moon'"
      />
      <ul>
        @for (link of links; track link.route) {
          <li>
            <a [routerLink]="link.route" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}" data-cuelume-hover="tick">{{ link.label }}</a>
          </li>
        }
        <li
          (click)="confirmLogout($event)"
          (keydown)="confirmLogout($event)"
          role="button"
          tabindex="0"
          aria-label="Cerrar sesión"
          class="logout-button"
          pTooltip="Cerrar Sesión"
          tooltipPosition="bottom"
        >
          <i class="bx bx-log-out" aria-hidden="true"></i>
        </li>
      </ul>
    </nav>
  </div>
</header>
