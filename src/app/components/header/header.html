<header class="gantia-header">
  <div class="header-container">
    <div class="brand-group">
      <a routerLink="/" class="logo-link" title="Inicio de Gantia">
        <img
          [ngSrc]="'/logos/logo.webp'"
          height="55"
          width="55"
          alt="Logo de Gantia - Letra Gamma minúscula"
          class="gantia-logo"
          priority
        />
      </a>
      <app-letras-gantia />
    </div>

    <nav class="main-nav">
      <div
        class="connection-status"
        [class]="'status-' + sensorSocket.connectionStatus()"
        [pTooltip]="statusLabel()"
        tooltipPosition="bottom"
      >
        <span class="status-dot"></span>
      </div>
      <app-rounded-button
        class="theme-toggle"
        (click)="themeService.toggleTheme()"
        [icon]="themeService.isDarkMode() ? 'bx bx-sun' : 'bx bx-moon'"
      />
      <ul>
        @for (link of links; track link.route) {
          <li>
            <a [routerLink]="link.route">{{ link.label }}</a>
          </li>
        }
        <!-- <li>
          <a routerLink="perfil" class="profile-link">Perfil</a>
        </li> -->
        <li
          (click)="authStore.logout()"
          class="logout-button"
          pTooltip="Cerrar Sesión"
          tooltipPosition="bottom"
        >
          <i class="bx bx-log-out"></i>
        </li>
      </ul>
    </nav>
  </div>
</header>
