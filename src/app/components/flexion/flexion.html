<div class="flexion-container">
  <div class="status-header">
    <span class="status-label">Botón</span>
    @let t = sensorSocket.telemetry();
    <div class="status-indicator" [class.active]="t?.button_pressed">
      <span class="dot"></span>
      <span class="text">{{ t?.button_pressed ? 'ACTIVO' : 'INACTIVO' }}</span>
    </div>
  </div>

  <div class="gauges-wrapper">
    @let flexState = displayIndex();
    @let middleState = displayMiddle();
    <div class="gauge-group">
      <div class="gauge-info">
        <span class="finger-name">Falange Índice</span>
        <span class="finger-value" [class.glowing]="glowingIndex()">{{ FLEX_STATE_LABELS[flexState] }}</span>
      </div>
      <div class="gauge-track">
        <div class="gauge-fill index-fill" [class.glowing]="glowingIndex()" [style.width.%]="(flexState / 2) * 100"></div>
      </div>
    </div>

    <div class="gauge-group">
      <div class="gauge-info">
        <span class="finger-name">Falange Media</span>
        <span class="finger-value" [class.glowing]="glowingMiddle()">{{ FLEX_STATE_LABELS[middleState] }}</span>
      </div>
      <div class="gauge-track">
        <div class="gauge-fill middle-fill" [class.glowing]="glowingMiddle()" [style.width.%]="(middleState / 2) * 100"></div>
      </div>
    </div>
  </div>
</div>
