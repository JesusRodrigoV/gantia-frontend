<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <app-letras-gantia />
      <img [ngSrc]="'/logos/logo.webp'" height="85" width="85" alt="Logo de Gantia" priority />
    </div>

    <h1 class="auth-title">Registro</h1>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Correo Electronico</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="usuario@ejemplo.com"
          class="form-control"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Mínimo 6 caracteres"
          class="form-control"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input
          type="password"
          id="confirmPassword"
          formControlName="confirmPassword"
          class="form-control"
        />
      </div>

      @if (authStore.error()) {
        <div class="auth-alert">
          {{ authStore.error() }}
        </div>
      }

      @if (
        registerForm.hasError('passwordsMismatch') && registerForm.get('confirmPassword')?.touched
      ) {
        <div class="auth-alert">Las contraseñas no coinciden</div>
      }

      <button
        type="submit"
        class="btn-submit"
        [disabled]="registerForm.invalid || authStore.isLoading()"
      >
        @if (authStore.isLoading()) {
          <i class="bx bx-loader-alt bx-spin"></i>
        } @else {
          Crear Cuenta
        }
      </button>
    </form>

    <div class="auth-footer">
      <a routerLink="/auth/login">¿Ya tienes cuenta? Inicia Sesión</a>
    </div>
  </div>
</div>
